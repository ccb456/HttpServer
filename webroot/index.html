<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NEXUS-首页</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

    <!-- PRE LOADER -->
    <div class="preloader">
        <div class="spinner">
            <span class="spinner-rotate"></span>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/" class="navbar-brand">Nexus</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li class="active"><a href="/">首页</a></li>
                    <li><a href="/picture">图片</a></li>
                    <li><a href="/video">视频</a></li>
                    <li><a href="/login">登录</a></li>
                    <li><a href="/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- HERO SECTION -->
    <section id="home">
        <div class="container">
            <div class="row">
                <div class="col-md-offset-1 col-md-2 col-sm-3">
                    <img src="images/profile-image.jpg" class="wow fadeInUp img-responsive img-circle"
                         data-wow-delay="0.2s" alt="profile">
                </div>
                <div class="col-md-8 col-sm-8">
                    <h1 class="wow fadeInUp" data-wow-delay="0.4s">你好，欢迎来到 Nexus</h1>
                    <p class="hero-subtitle wow fadeInUp" data-wow-delay="0.6s">
                        一个轻量级的 HTTP 服务器，支持图片展示、视频播放与用户系统
                    </p>
                    <a href="/picture" class="wow fadeInUp btn btn-default section-btn" data-wow-delay="0.8s">
                        探索更多 <i class="fa fa-arrow-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- FEATURES SECTION -->
    <section class="features-section">
        <div class="container">
            <div class="row">
                <div class="col-md-4 col-sm-6">
                    <div class="feature-card wow fadeInUp" data-wow-delay="0.2s">
                        <div class="feature-icon"><i class="fa fa-image"></i></div>
                        <h3>图片展示</h3>
                        <p>浏览精美的图片画廊，支持多种图片格式在线预览</p>
                    </div>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class="feature-card wow fadeInUp" data-wow-delay="0.4s">
                        <div class="feature-icon"><i class="fa fa-video-camera"></i></div>
                        <h3>视频播放</h3>
                        <p>在线播放高清视频，支持流畅的流媒体传输体验</p>
                    </div>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class="feature-card wow fadeInUp" data-wow-delay="0.6s">
                        <div class="feature-icon"><i class="fa fa-user-circle-o"></i></div>
                        <h3>用户系统</h3>
                        <p>支持用户注册与登录，安全可靠的账户管理功能</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <div class="site-footer">
        <div class="container">
            <p>© 2026 Nexus HttpServer. All rights reserved.</p>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/smoothscroll.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/magnific-popup-options.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/custom.js"></script>
</body>

</html>
