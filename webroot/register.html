<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NEXUS-注册</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/animate.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

    <!-- PRE LOADER -->
    <div class="preloader">
        <div class="spinner">
            <span class="spinner-rotate"></span>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="navbar custom-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/" class="navbar-brand">Nexus</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/">首页</a></li>
                    <li><a href="/picture">图片</a></li>
                    <li><a href="/video">视频</a></li>
                    <li><a href="/login">登录</a></li>
                    <li class="active"><a href="/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-page">
        <div class="container">
            <div class="form-card wow fadeInUp" data-wow-delay="0.2s">
                <h2><i class="fa fa-user-plus"></i> 注册</h2>
                <p class="form-hint">创建一个新账户</p>

                <form action="register" method="post">
                    <div class="input-group-wrap">
                        <span class="input-icon"><i class="fa fa-user"></i></span>
                        <input type="text" name="username" placeholder="用户名" required="required">
                    </div>
                    <div class="input-group-wrap">
                        <span class="input-icon"><i class="fa fa-lock"></i></span>
                        <input type="password" name="password" placeholder="密码" required="required">
                    </div>
                    <button type="submit" class="btn-submit">注 册</button>
                </form>

                <div class="form-footer">
                    已有账户？<a href="/login">立即登录 &rarr;</a>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="site-footer">
        <div class="container">
            <p>© 2026 Nexus HttpServer. All rights reserved.</p>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/smoothscroll.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/magnific-popup-options.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="js/custom.js"></script>
</body>

</html>
